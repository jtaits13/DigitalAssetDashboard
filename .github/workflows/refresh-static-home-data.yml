# Full data refresh for the static site: runs export pipelines, writes `static_home/data/*.json`, deploys.
# Schedule: every 6 hours (UTC).
# Manual run: GitHub repo → Actions tab → this workflow (left list) → Run workflow (dropdown on the right).
# The live Pages site URL does not list workflows; they only exist under Actions.
name: Refresh static home data and deploy

on:
  schedule:
    - cron: "25 */6 * * *"
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note (for your own log)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-refresh
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore CoinGecko About blurb cache
        uses: actions/cache@v4
        with:
          path: static_home/data/crypto_about_blurbs_cache.json
          key: crypto-about-blurbs-v1-${{ hashFiles('coingecko_about.py') }}
          restore-keys: |
            crypto-about-blurbs-v1-

      - name: Export RSS + ETP + RWA + crypto JSON
        run: python scripts/export_static_site_data.py
        env:
          STOCKANALYSIS_USER_AGENT: ${{ secrets.STOCKANALYSIS_USER_AGENT }}
          COINGECKO_DEMO_API_KEY: ${{ secrets.COINGECKO_DEMO_API_KEY }}
          COINGECKO_BLURB_FETCH_LIMIT: "15"

      - name: Upload static_home as site root
        uses: actions/upload-pages-artifact@v3
        with:
          path: static_home

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

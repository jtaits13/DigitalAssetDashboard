# Publishes `static_home/` to GitHub Pages.
# Runs the same Python fetch pipelines as Streamlit, writes JSON under static_home/data/, then deploys.
# One-time: Repo → Settings → Pages → Source → GitHub Actions.
name: Deploy static home to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "static_home/**"
      - ".github/workflows/deploy-static-home.yml"
      - "scripts/export_static_site_data.py"
      - "coingecko_about.py"
      - "crypto_categories.py"
      - "price_ticker.py"
      - "requirements.txt"
      - "news_feeds.py"
      - "regulatory_news/**"
      - "crypto_etps/**"
      - "rwa_league/**"
      - "home_layout.py"
      - "pages/**"
  workflow_dispatch:
  # Re-export JSON from primary sources and redeploy so a normal browser reload sees newer data
  # (without a new git push). Adjust cadence as needed; times are UTC.
  schedule:
    - cron: "25 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore CoinGecko About blurb cache
        uses: actions/cache@v4
        with:
          path: static_home/data/crypto_about_blurbs_cache.json
          key: crypto-about-blurbs-v1-${{ hashFiles('coingecko_about.py') }}
          restore-keys: |
            crypto-about-blurbs-v1-

      - name: Export RSS + ETP JSON for static site
        run: python scripts/export_static_site_data.py
        env:
          STOCKANALYSIS_USER_AGENT: ${{ secrets.STOCKANALYSIS_USER_AGENT }}
          COINGECKO_DEMO_API_KEY: ${{ secrets.COINGECKO_DEMO_API_KEY }}
          # At most 15 new CoinGecko About fetches per deploy; cache fills over scheduled runs.
          COINGECKO_BLURB_FETCH_LIMIT: "15"

      - name: Upload static_home as site root
        uses: actions/upload-pages-artifact@v3
        with:
          path: static_home

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

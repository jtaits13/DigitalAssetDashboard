# Publishes `static_home/` to GitHub Pages (static HTML/CSS).
# One-time: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy static home to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "static_home/**"
      - ".github/workflows/deploy-static-home.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static_home as site root
        uses: actions/upload-pages-artifact@v3
        with:
          path: static_home

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

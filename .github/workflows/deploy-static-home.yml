# Fast GitHub Pages deploy: publishes committed files under `static_home/` as-is (no API export).
# Fresh JSON from RSS / ETP / RWA / CoinGecko runs on the 6-hour schedule in `refresh-static-home-data.yml`.
# Repo → Settings → Pages → Source → GitHub Actions.
name: Deploy static home to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "static_home/**"
      - ".github/workflows/deploy-static-home.yml"
      - ".github/workflows/refresh-static-home-data.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-push
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload static_home as site root
        uses: actions/upload-pages-artifact@v3
        with:
          path: static_home

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

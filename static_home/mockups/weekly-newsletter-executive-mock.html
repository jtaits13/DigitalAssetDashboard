<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mock &mdash; Executive weekly newsletter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1a3d5c;
        --muted: #5c6b7a;
        --line: #dde4ec;
        --wash: #e9eef3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Outfit, "Segoe UI", system-ui, sans-serif;
        background: var(--wash);
        color: var(--ink);
      }

      .wrap {
        max-width: 1180px;
        margin: 0 auto;
        padding: 1.25rem 1rem 2rem;
      }

      .preview-shell {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 1px 3px rgb(26 61 92 / 0.06);
      }

      .preview-shell iframe {
        display: block;
        width: 100%;
        min-height: 1480px;
        border: 0;
        background: #e9eef3;
      }

    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="preview-shell" aria-label="Executive newsletter email preview">
        <iframe
          src="weekly-newsletter-email-executive-mock.html"
          title="Executive weekly newsletter email body"
          loading="lazy"
        ></iframe>
      </section>
    </div>
  </body>
</html>
